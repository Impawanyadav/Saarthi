<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Saarthi Menu</title>
	<link rel="stylesheet" href="/index.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
		integrity="sha512-pVn6X... (trimmed)" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

	<div class="header">





		<div class="logo"><button class="iconButton" id="menuBtn"><i class="fa-solid fa-bars"></i></button></div>
		<div class="logo">Saarthi</div>
		<div class="contact">
			<div class="c1"><button class="iconButton2" id="iconButton2"><i class="fa-regular fa-user"></i> </button>
			</div>
			<div class="c1 sidebar">Contact Us </div>
			<div class="c1 sidebar">About Us </div>


		</div>

	</div>
	
	<div class="side-menu" id="sideMenu">
		<button id="close"><i class="fa-solid fa-xmark"></i></button>
		<a th:href="@{/home}">Home</a>
				<a th:href="@{/workPage}">Working Professionals</a>
				<a th:href="@{/roomRent}">Room Rent</a>
				<a th:href="@{/tiffinService}">Tiffin Service</a>
				<a th:href="@{/milkDairy}">Milk Dairy</a>
				
				<a th:href="@{/logOut}">Logout</a>
				
	</div>


	<div class="user-side-menu" id="userSideMenu">
		<button id="userClose"><i class="fa-solid fa-xmark"></i></button>
		<a href="#"><span th:text="${session.usersName}"></span></a>
		<a href="#">---</a>
		<a href="#">---</a>
		<a href="#">---</a>
		<a href="#">//</a>
	</div>
	<div class="main">
		




			
			<div class="s">
			 <input type="text" id="city" placeholder="Enter City" class="ser">
			<select id="work" class="ser">
				<option value="">-- Select Profession --</option>

								    <option value="AC Technician">AC Technician</option>
								    <option value="Carpenter">Carpenter</option>
								    <option value="Construction Worker">Construction Worker</option>
								    <option value="Cook">Cook / Chef</option>
								    <option value="Driver">Driver</option>
								    <option value="Electrician">Electrician</option>
								    <option value="Gardener">Gardener / Mali</option>
								    <option value="Labour">Daily Wage Labour</option>
								    <option value="Maid">House Maid</option>
								    <option value="Mechanic">Mechanic</option>
								    <option value="Painter">Painter</option>
								    <option value="Plaster Worker">Plaster Worker</option>
								    <option value="Plumber">Plumber</option>
								    <option value="Security Guard">Security Guard</option>
								    <option value="Sweeper">Sweeper</option>
								    <option value="Tailor">Tailor</option>
									<option value="Tution Teacher">Tution Teacher</option>
								    <option value="Welder">Welder</option>
								

							</select>
			<button onclick="searchJobs()" class="ser">Search</button>
			</div>
			

			<div id="workers"></div>



	</div>

	<script src="/js/main.js"></script>
	
	<script th:src="@{/js/workers.js}"></script>
</body>

</html>
